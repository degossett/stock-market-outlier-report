name: Quantitative Anomaly Pipeline

# 1. THE SCHEDULE
on:
  schedule:
    # Runs at 10:30 UTC (4:30 AM MDT) Tuesday through Saturday
    - cron: '30 10 * * 2-6'
  
  # Allows you to click a "Run workflow" button to test it manually
  workflow_dispatch: 

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest # This is the fresh Docker container GitHub gives you

    steps:
      # 2. GRAB THE CODE
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 3. SET UP PYTHON
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Caches dependencies to make future runs faster

      # 4. INSTALL LIBRARIES
      - name: Install Requirements
        run: pip install -r requirements.txt

      # 5. RUN THE MASTER SCRIPT (WITH SECRETS INJECTED)
      - name: Execute Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python 00_execute_pipeline.py

      # 6. EMAIL THE RESULTS
      - name: Send HTML Newsletter
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SENDER_EMAIL }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "Daily Market Anomalies (Quant Report)"
          to: ${{ secrets.MY_SECRET_EMAIL }}
          from: "AI Quant Pipeline"
          # Sends the HTML file generated by Script 11
          html_body: file://daily_anomaly_newsletter.html
          # Do not send if the pipeline crashed before making the HTML
          ignore_cert: true
